name: Build for macOS 10.4 PPC

on:
  push:
    branches: [ main, master, AngledLighting ]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-macppc
  cancel-in-progress: true

jobs:
  build-macppc:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang bison flex \
            libssl-dev libmpc-dev libmpfr-dev libgmp-dev cmake curl xz-utils

      - name: Clone osxcross (with legacy SDK support)
        run: |
          git clone --branch osxcross-1.1 https://github.com/tpoechtrager/osxcross.git
          cp .github/workflows/MacOSX10.4u.sdk.tar.xz osxcross/tarballs/

      - name: Build osxcross (PPC toolchain)
        run: |
          cd osxcross
          UNATTENDED=yes OSX_VERSION_MIN=10.4 TARGET=powerpc-apple-darwin10 ./build.sh

      - name: Compile for macOS 10.4 PPC
        run: |
          export PATH="${GITHUB_WORKSPACE}/osxcross/target/bin:$PATH"
          export CC=powerpc-apple-darwin10-gcc
          export CFLAGS="-mmacosx-version-min=10.4 -arch ppc -O2"
          COMMIT_SHA=$(git rev-parse --short "$GITHUB_SHA")

          mkdir -p build
          $CC $CFLAGS -DCC_COMMIT_SHA="\"$COMMIT_SHA\"" \
            -framework Cocoa -framework OpenGL \
            src/*.c src/Window_cocoa.m third_party/bearssl/*.c \
            -o build/cc-macppc

      - name: Upload PPC build
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-macOS10.4-PPC
          path: build/cc-macppc