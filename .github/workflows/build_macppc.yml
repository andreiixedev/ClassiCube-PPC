name: Build for macOS 10.4.11 PPC

on:
  push:
    branches:
      - main
      - master
      - AngledLighting
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-macppc
  cancel-in-progress: true

jobs:
  build-ppc:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PPC cross compiler (powerpc-apple-darwin)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar gcc make curl
          
          # Download and extract prebuilt PPC macOS cross-compiler (example)
          mkdir -p $HOME/cross
          cd $HOME/cross
          wget https://github.com/tpoechtrager/osxcross/releases/download/v20210410/osxcross.tar.xz
          tar -xf osxcross.tar.xz
          export PATH="$HOME/cross/osxcross/target/bin:$PATH"

      - name: Build for macOS PPC
        env:
          LIBS: "-framework Cocoa -framework OpenGL"
          SRCS: "src/*.c src/Window_cocoa.m third_party/bearssl/*.c"
          FLAGS: "-O1 -no-pie -mmacosx-version-min=10.4 -arch ppc"
        run: |
          export PATH="$HOME/cross/osxcross/target/bin:$PATH"
          export CC=powerpc-apple-darwin10-gcc
          
          COMMIT_SHA=$(git rev-parse --short "$GITHUB_SHA")
          PPC_OUT="cc-macppc"
          
          $CC $FLAGS $SRCS -DCC_COMMIT_SHA="\"$COMMIT_SHA\"" -o $PPC_OUT $LIBS

      - uses: ./.github/actions/upload_build
        if: success()
        with:
          SOURCE_FILE: 'cc-macppc'
          DEST_NAME: 'ClassiCube-macOS10.4-PPC'

      - uses: ./.github/actions/notify_success
        if: success()
        with:
          DESTINATION_URL: '${{ secrets.NOTIFY_URL }}'
          WORKFLOW_NAME: 'macOS10.4-PPC'

      - uses: ./.github/actions/notify_failure
        if: failure()
        with:
          NOTIFY_MESSAGE: 'Failed to compile macOS 10.4 PPC build'
          WEBHOOK_URL: '${{ secrets.WEBHOOK_URL }}'
